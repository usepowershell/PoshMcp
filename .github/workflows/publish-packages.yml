name: Build and Publish Packages

# Triggers:
# - Automatically on release creation (published event)
# - Manual dispatch via workflow_dispatch for testing/debugging
# - Supports pre-releases and drafts
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (leave empty to use project version)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    name: Build & Publish NuGet Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Extract version from git tag for releases, or use provided input for manual dispatch
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Extract version from git tag (v1.2.3 -> 1.2.3)
            VERSION=${{ github.event.release.tag_name }}
            VERSION=${VERSION#v}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "source=release tag" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "source=manual dispatch input" >> $GITHUB_OUTPUT
          else
            # Fall back to csproj version (PoshMcp.Server.csproj)
            VERSION=$(grep -m1 '<Version>' PoshMcp.Server/PoshMcp.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "source=project file" >> $GITHUB_OUTPUT
          fi

      - name: Display build information
        run: |
          echo "::group::Build Configuration"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Version Source: ${{ steps.version.outputs.source }}"
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "::endgroup::"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build projects
        run: dotnet build --configuration Release --no-restore
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Run tests before packaging
        continue-on-error: false
        run: |
          dotnet test --configuration Release --no-build \
            --filter "FullyQualifiedName~Unit|FullyQualifiedName~Functional" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Pack NuGet packages
        run: |
          dotnet pack PoshMcp.Server/PoshMcp.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.version }}
          
          echo "::group::Package Contents"
          ls -lah ./nupkg/
          echo "::endgroup::"

      - name: Publish to GitHub Packages
        run: |
          # Configure dotnet to use GitHub Packages feeds
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          
          # Push all nupkg files
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source github \
            --skip-duplicate
          
          echo "✓ Packages published to GitHub Packages"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-artifacts
          path: ./nupkg/*.nupkg
          if-no-files-found: warn
          retention-days: 30

      - name: Create GitHub Release Note
        if: github.event_name == 'workflow_dispatch' && success()
        run: |
          echo "::notice::Package build and publish completed successfully"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "GitHub Packages: https://github.com/${{ github.repository }}/packages"

      - name: Report job failure
        if: failure()
        run: |
          echo "::error::Package build/publish workflow failed"
          echo "Check logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
