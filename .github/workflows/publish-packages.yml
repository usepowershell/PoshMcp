name: Build and Publish Packages

# Triggers:
# - Automatically on version tag push (e.g. v0.6.0)
# - Manual dispatch via workflow_dispatch for testing/debugging
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (leave empty to use project version)'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    name: Build & Publish NuGet Packages
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Extract version from git tag for releases, or use provided input for manual dispatch
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            # Extract version from git tag (v1.2.3 -> 1.2.3)
            VERSION="${{ github.ref_name }}"
            VERSION=${VERSION#v}
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "source=git tag" >> $GITHUB_OUTPUT
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "source=manual dispatch input" >> $GITHUB_OUTPUT
          else
            # Fall back to csproj version (PoshMcp.Server.csproj)
            VERSION=$(grep -m1 '<Version>' PoshMcp.Server/PoshMcp.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "source=project file" >> $GITHUB_OUTPUT
          fi

      - name: Display build information
        run: |
          echo "::group::Build Configuration"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Version Source: ${{ steps.version.outputs.source }}"
          echo "Repository: ${{ github.repository }}"
          echo "Event: ${{ github.event_name }}"
          echo "::endgroup::"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build projects
        run: dotnet build --configuration Release --no-restore
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Run tests before packaging
        continue-on-error: false
        run: |
          dotnet test --configuration Release --no-build \
            --filter "FullyQualifiedName~Unit|FullyQualifiedName~Functional" \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults

      - name: Pack NuGet packages
        run: |
          dotnet pack PoshMcp.Server/PoshMcp.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.version }}
          
          echo "::group::Package Contents"
          ls -lah ./nupkg/
          echo "::endgroup::"

      - name: Publish to GitHub Packages
        run: |
          # Configure dotnet to use GitHub Packages feeds
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          # Push all nupkg files
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source github \
            --skip-duplicate

          echo "✓ Packages published to GitHub Packages"

      - name: Publish to NuGet.org
        if: github.event_name == 'push'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          echo "✓ Packages published to NuGet.org"

      - name: Create or update GitHub Release with notes
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES_FILE="docs/release-notes/${VERSION}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            echo "Using release notes from $NOTES_FILE"
            gh release create "v${VERSION}" \
              --title "PoshMcp ${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --verify-tag \
              2>/dev/null || \
            gh release edit "v${VERSION}" \
              --notes-file "$NOTES_FILE" \
              --title "PoshMcp ${VERSION}"
          else
            echo "No release notes file found at $NOTES_FILE — skipping release notes update"
            gh release create "v${VERSION}" \
              --title "PoshMcp ${VERSION}" \
              --generate-notes \
              --verify-tag \
              2>/dev/null || echo "Release already exists"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-artifacts
          path: ./nupkg/*.nupkg
          if-no-files-found: warn
          retention-days: 30

  build-and-publish-container:
    runs-on: ubuntu-latest
    name: Build & Publish Container Image
    needs: build-and-publish
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore and build PoshMcp.Server
        run: dotnet build PoshMcp.Server/PoshMcp.csproj --configuration Release
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      # Compute the fully-qualified ghcr.io image name.
      # github.repository is already owner/repo so we just lower-case it.
      - name: Compute image name
        id: image
        run: |
          REPO="${{ github.repository }}"
          echo "name=ghcr.io/${REPO,,}/poshmcp" >> $GITHUB_OUTPUT

      # Use the poshmcp CLI to build the container image from repo source.
      # poshmcp build --type base --tag delegates to: docker build -f Dockerfile -t <tag>
      # dotnet run is used here so we don't need a global tool install in CI.
      - name: Build container image with poshmcp build
        run: |
          IMAGE="${{ steps.image.outputs.name }}:${{ needs.build-and-publish.outputs.version }}"
          echo "Building image: $IMAGE"
          dotnet run --project PoshMcp.Server/PoshMcp.csproj \
            --configuration Release --no-build \
            -- build --type base --tag "$IMAGE"

      - name: Tag image as latest (tag push only)
        if: github.event_name == 'push'
        run: |
          IMAGE="${{ steps.image.outputs.name }}:${{ needs.build-and-publish.outputs.version }}"
          docker tag "$IMAGE" "${{ steps.image.outputs.name }}:latest"

      - name: Push versioned image
        run: |
          docker push "${{ steps.image.outputs.name }}:${{ needs.build-and-publish.outputs.version }}"

      - name: Push latest tag (tag push only)
        if: github.event_name == 'push'
        run: |
          docker push "${{ steps.image.outputs.name }}:latest"

      - name: Summary
        run: |
          echo "## Container Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ steps.image.outputs.name }}:${{ needs.build-and-publish.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "- \`${{ steps.image.outputs.name }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create GitHub Release Note
        if: github.event_name == 'workflow_dispatch' && success()
        run: |
          echo "::notice::Package build and publish completed successfully"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "GitHub Packages: https://github.com/${{ github.repository }}/packages"

      - name: Report job failure
        if: failure()
        run: |
          echo "::error::Package build/publish workflow failed"
          echo "Check logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
