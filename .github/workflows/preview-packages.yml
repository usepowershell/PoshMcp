name: Preview Packages

on:
  push:
    branches: [main]
    paths:
      - '**.cs'
      - '**.csproj'
      - '**.sln'
      - 'PoshMcp.Server/**.ps1'
      - '.github/workflows/preview-packages.yml'

permissions:
  contents: read
  packages: write

jobs:
  preview:
    runs-on: ubuntu-latest
    name: Build & Publish Preview NuGet Package
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[no preview]')"
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Determine preview version
        id: version
        run: |
          BASE_VERSION=$(grep -m1 '<Version>' PoshMcp.Server/PoshMcp.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          PREVIEW_VERSION="${BASE_VERSION}-preview.${GITHUB_RUN_NUMBER}"
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "version=${PREVIEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Preview version: ${PREVIEW_VERSION}"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build --configuration Release --no-restore
        env:
          DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
          DOTNET_CLI_TELEMETRY_OPTOUT: true

      - name: Test (Unit)
        run: |
          dotnet test --no-build --configuration Release \
            --filter "FullyQualifiedName~Unit" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --results-directory ./TestResults

      - name: Test (Functional)
        run: |
          dotnet test --blame --no-build --configuration Release \
            --filter "FullyQualifiedName~Functional" \
            --logger "trx;LogFileName=functional-tests.trx" \
            --results-directory ./TestResults

      - name: Pack preview NuGet package
        run: |
          dotnet pack PoshMcp.Server/PoshMcp.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            /p:Version=${{ steps.version.outputs.version }}

          echo "::group::Package Contents"
          ls -lah ./nupkg/
          echo "::endgroup::"

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget add source \
            --username ${{ github.actor }} \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source github \
            --skip-duplicate

          echo "✓ Preview package published to GitHub Packages"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-nupkg-${{ steps.version.outputs.version }}
          path: ./nupkg/*.nupkg
          if-no-files-found: warn
          retention-days: 14

      - name: Write job summary
        run: |
          echo "## 📦 Preview Package Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | [\`#${GITHUB_RUN_NUMBER}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub Packages:** https://github.com/${{ github.repository }}/packages" >> $GITHUB_STEP_SUMMARY
